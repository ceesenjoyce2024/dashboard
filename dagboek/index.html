<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dagboek">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Dagboek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">
<script src="../theme.js"></script>
<style>
  :root {
    --sand:        #e8e4d9;
    --sand-light:  #f2efe6;
    --sand-dark:   #d8d4c6;
    --olive:       #5c5a2e;
    --olive-mid:   #7a7838;
    --olive-light: #c8c89a;
    --text:        #3d3b1e;
    --text-muted:  #7a7860;
    --card-bg:     #f7f4ec;
    --green-fill:  #a8d4a8;
    --green-dark:  #2e6e32;
    --yellow-fill: #e6e87a;
    --yellow-dark: #7a7a10;
    --red-fill:    #f0c4c4;
    --red-dark:    #8a2828;
    --radius:      12px;
    --radius-sm:   8px;
    --serif:       'Playfair Display', Georgia, serif;
    --sans:        'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--sans);
    background: var(--sand);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .app { max-width: 480px; margin: 0 auto; padding: 0 12px 80px; }

  /* ── Header ── */
  .topbar {
    background: var(--header-bg);
    border-bottom: 1px solid rgba(0,0,0,0.1);
    padding: 14px 16px 12px;
    padding-top: calc(14px + env(safe-area-inset-top));
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-top {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
  }
  .back-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--header-text);
    padding: 6px 12px; border-radius: 7px;
    font-size: 13px; cursor: pointer;
    white-space: nowrap; text-decoration: none;
    display: inline-block; font-family: var(--sans);
  }
  .back-btn:hover { background: rgba(255,255,255,0.25); }
  .topbar-title {
    font-family: var(--serif);
    font-size: 19px; font-weight: 600;
    color: var(--header-text);
  }
  .month-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .mnav {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    color: var(--header-text); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .mnav:hover { background: rgba(255,255,255,0.2); }
  .month-name {
    font-size: 15px; font-weight: 500;
    color: var(--header-text);
  }

  /* ── Sync bar ── */
  .sync-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0 6px; font-size: 12px; color: var(--text-muted);
  }
  .sdot { width: 8px; height: 8px; border-radius: 50%; background: var(--olive-mid); flex-shrink: 0; }
  .sdot.busy { background: var(--yellow-dark); animation: pulse 1s infinite; }
  .sdot.err  { background: var(--red-dark); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .refresh-btn {
    margin-left: auto; padding: 4px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--sand-dark); background: var(--card-bg);
    font-size: 12px; cursor: pointer; color: var(--text-muted);
    font-family: var(--sans);
  }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 6px; padding: 10px 0 6px; }
  .tab {
    flex: 1; padding: 9px; border-radius: var(--radius-sm);
    border: 1px solid var(--sand-dark);
    background: var(--card-bg); color: var(--text-muted);
    font-size: 13px; font-family: var(--sans); font-weight: 500;
    cursor: pointer; text-align: center;
  }
  .tab.active {
    background: var(--olive); color: var(--sand-light);
    border-color: var(--olive);
  }

  /* ── Legend ── */
  .legend { display: flex; gap: 14px; padding: 4px 0 10px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }
  .ldot { width: 10px; height: 10px; border-radius: 50%; }

  /* ── Calendar ── */
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .dh {
    text-align: center; font-size: 11px; font-weight: 500;
    color: var(--text-muted); padding: 4px 0;
  }
  .cell {
    aspect-ratio: 1; border-radius: var(--radius-sm);
    border: 1px solid var(--sand-dark);
    background: var(--card-bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; overflow: hidden;
  }
  .cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .cell.today { border-color: var(--olive); border-width: 2px; }
  .cell-bg { position: absolute; inset: 0; opacity: 0.55; }
  .cell-num { font-size: 13px; color: var(--text-muted); position: relative; z-index: 1; }
  .cell.today .cell-num { font-weight: 600; color: var(--olive); }

  /* ── Sheet ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(60,58,30,0.45); z-index: 100;
    align-items: flex-end; justify-content: center;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
    width: 100%; max-width: 480px;
    animation: up .2s ease;
    border-top: 1px solid var(--sand-dark);
  }
  @keyframes up { from{transform:translateY(100%)}to{transform:translateY(0)} }
  .handle {
    width: 36px; height: 4px; background: var(--sand-dark);
    border-radius: 2px; margin: 0 auto 16px;
  }
  .sheet-date {
    font-family: var(--serif);
    font-size: 16px; font-weight: 600;
    color: var(--olive); margin-bottom: 16px;
    text-transform: capitalize;
  }
  .sheet-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .sopt {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px; border-radius: var(--radius);
    border: 1.5px solid var(--sand-dark);
    background: var(--sand-light); cursor: pointer;
    font-size: 15px; font-family: var(--sans); font-weight: 500; color: var(--text);
  }
  .sopt.sel { border-color: var(--olive); background: var(--rol-admin-bg); }
  .sopt-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; }
  .sheet-btns { display: flex; gap: 8px; }
  .sbtn {
    flex: 1; padding: 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--sand-dark); background: var(--sand-light);
    font-family: var(--sans); font-size: 14px; font-weight: 500;
    color: var(--text); cursor: pointer;
  }
  .sbtn.primary { background: var(--olive); color: var(--sand-light); border-color: var(--olive); }
  .sbtn.primary:hover { background: var(--olive-mid); }
  .sbtn.danger { color: var(--red-dark); }

  /* ── Chart ── */
  .chart-view { display: none; padding-top: 8px; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
  .sc {
    background: var(--card-bg); border-radius: var(--radius);
    padding: 14px 10px; text-align: center; border: 1px solid var(--sand-dark);
  }
  .sc-l { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .sc-v { font-size: 26px; font-weight: 600; }
  .vg { color: var(--green-dark); }
  .vy { color: var(--yellow-dark); }
  .vr { color: var(--red-dark); }
  .chart-box {
    background: var(--card-bg); border-radius: var(--radius);
    border: 1px solid var(--sand-dark); padding: 16px;
  }
  .chart-box h3 {
    font-size: 13px; color: var(--text-muted); margin-bottom: 14px;
    font-weight: 500; letter-spacing: 0.02em;
  }
  .brow { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .bl { font-size: 11px; color: var(--text-muted); width: 26px; text-align: right; flex-shrink: 0; }
  .bt { flex: 1; height: 18px; background: var(--sand); border-radius: 4px; overflow: hidden; position: relative; }
  .bf { height: 100%; position: absolute; }
  .bn { font-size: 11px; color: var(--text-muted); width: 20px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-top">
      <a class="back-btn" href="../index.html">‹ Dashboard</a>
      <div class="topbar-title">Dagboek</div>
    </div>
    <div class="month-row">
      <button class="mnav" id="prev">&#8249;</button>
      <span class="month-name" id="monthName"></span>
      <button class="mnav" id="next">&#8250;</button>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sdot busy" id="sdot"></div>
    <span id="smsg">Verbinden...</span>
    <button class="refresh-btn" onclick="loadAll()">&#8635; Vernieuwen</button>
  </div>

  <div class="tabs">
    <button class="tab active" id="tCal"   onclick="setView('cal')">Kalender</button>
    <button class="tab"        id="tChart" onclick="setView('chart')">Grafiek</button>
  </div>

  <div class="legend">
    <span class="leg"><span class="ldot" style="background:var(--green-dark)"></span>Droog</span>
    <span class="leg"><span class="ldot" style="background:var(--yellow-dark)"></span>Minimaal</span>
    <span class="leg"><span class="ldot" style="background:var(--red-dark)"></span>Niet droog</span>
  </div>

  <div id="calView">
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="chart-view" id="chartView">
    <div class="stats" id="stats"></div>
    <div class="chart-box">
      <h3 id="chartTitle"></h3>
      <div id="bars"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-date" id="sheetDate"></div>
    <div class="sheet-opts" id="sheetOpts"></div>
    <div class="sheet-btns">
      <button class="sbtn danger" id="btnWis">Wissen</button>
      <button class="sbtn" onclick="closeSheet()">Annuleer</button>
      <button class="sbtn primary" id="btnSave">Opslaan</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://hvpooifxqhovskwgzpbr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2cG9vaWZ4cWhvdnNrd2d6cGJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzQ1MzQsImV4cCI6MjA5NzAxMDUzNH0.zM3vFf6RB7uE4QoLP2uYdPe2AMI9NPJPFWqxQ_M2A3g';
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ST = [
  { key:'droog',     label:'Droog',      fill:'#a8d4a8', dark:'#2e6e32' },
  { key:'minimaal',  label:'Minimaal',   fill:'#e6e87a', dark:'#7a7a10' },
  { key:'net-droog', label:'Niet droog', fill:'#f0c4c4', dark:'#8a2828' }
];
const MONTHS = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
const DAYS   = ['Ma','Di','Wo','Do','Vr','Za','Zo'];

let cache = {};
let selDay = null, selKey = null;
const now = new Date();
let cy = now.getFullYear(), cm = now.getMonth();

function dk(y,m,d) {
  return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}

function sync(state, msg) {
  const dot = document.getElementById('sdot');
  dot.className = 'sdot'+(state==='busy'?' busy':state==='err'?' err':'');
  document.getElementById('smsg').textContent = msg;
}

window.loadAll = async function() {
  sync('busy','Laden...');
  try {
    const { data, error } = await sbClient.from('dagboek').select('datum, status');
    if (error) throw error;
    cache = {};
    data.forEach(function(row){ cache[row.datum]=row.status; });
    sync('ok','Gesynchroniseerd');
    renderCal();
    if (document.getElementById('chartView').style.display==='block') renderChart();
  } catch(e) {
    console.error(e);
    sync('err','Verbinding mislukt');
  }
};

async function saveDay(key, val) {
  sync('busy','Opslaan...');
  try {
    if (val) {
      const { error } = await sbClient.from('dagboek').upsert({ datum:key, status:val },{ onConflict:'datum' });
      if (error) throw error;
      cache[key] = val;
    } else {
      const { error } = await sbClient.from('dagboek').delete().eq('datum',key);
      if (error) throw error;
      delete cache[key];
    }
    sync('ok','Opgeslagen');
  } catch(e) {
    console.error(e);
    sync('err','Opslaan mislukt');
  }
}

function renderCal() {
  document.getElementById('monthName').textContent = MONTHS[cm]+' '+cy;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DAYS.forEach(function(d){
    const e=document.createElement('div'); e.className='dh'; e.textContent=d; grid.appendChild(e);
  });
  let dow = new Date(cy,cm,1).getDay();
  dow = dow===0?6:dow-1;
  for(let i=0;i<dow;i++){
    const e=document.createElement('div'); e.className='cell empty'; grid.appendChild(e);
  }
  const days = new Date(cy,cm+1,0).getDate();
  for(let d=1;d<=days;d++){
    const cell=document.createElement('div'); cell.className='cell';
    if(d===now.getDate()&&cm===now.getMonth()&&cy===now.getFullYear()) cell.classList.add('today');
    const st=cache[dk(cy,cm,d)];
    if(st){
      const s=ST.find(function(x){return x.key===st;});
      if(s){
        const bg=document.createElement('div'); bg.className='cell-bg';
        bg.style.background=s.fill; cell.appendChild(bg);
      }
    }
    const num=document.createElement('div'); num.className='cell-num'; num.textContent=d;
    cell.appendChild(num);
    cell.addEventListener('click',(function(day){return function(){openSheet(day);};})(d));
    grid.appendChild(cell);
  }
}

function openSheet(d) {
  selDay=d; selKey=cache[dk(cy,cm,d)]||null;
  const dt=new Date(cy,cm,d);
  document.getElementById('sheetDate').textContent=dt.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
  const opts=document.getElementById('sheetOpts');
  opts.innerHTML='';
  ST.forEach(function(s){
    const el=document.createElement('button');
    el.className='sopt'+(selKey===s.key?' sel':'');
    el.innerHTML='<span class="sopt-dot" style="background:'+s.fill+';border:2px solid '+s.dark+'"></span>'+s.label;
    el.onclick=function(){
      selKey=s.key;
      opts.querySelectorAll('.sopt').forEach(function(x){x.classList.remove('sel');});
      el.classList.add('sel');
    };
    opts.appendChild(el);
  });
  document.getElementById('overlay').classList.add('open');
  document.getElementById('btnSave').onclick=async function(){
    await saveDay(dk(cy,cm,selDay),selKey); closeSheet(); renderCal();
  };
  document.getElementById('btnWis').onclick=async function(){
    await saveDay(dk(cy,cm,selDay),null); closeSheet(); renderCal();
  };
}

window.closeSheet=function(){document.getElementById('overlay').classList.remove('open');};
document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===document.getElementById('overlay')) closeSheet();
});
document.getElementById('prev').addEventListener('click',function(){
  cm--;if(cm<0){cm=11;cy--;}renderCal();
});
document.getElementById('next').addEventListener('click',function(){
  cm++;if(cm>11){cm=0;cy++;}renderCal();
});

window.setView=function(v){
  document.getElementById('calView').style.display   = v==='cal'   ?'block':'none';
  document.getElementById('chartView').style.display = v==='chart' ?'block':'none';
  document.getElementById('tCal').classList.toggle('active',   v==='cal');
  document.getElementById('tChart').classList.toggle('active', v==='chart');
  if(v==='chart') renderChart();
};

function renderChart() {
  document.getElementById('chartTitle').textContent='Dagen per maand — '+cy;
  let tD=0,tM=0,tH=0;
  const pm=[];
  for(let m=0;m<12;m++){
    const days=new Date(cy,m+1,0).getDate();
    let d=0,mi=0,h=0;
    for(let dd=1;dd<=days;dd++){
      const s=cache[dk(cy,m,dd)];
      if(s==='droog') d++;
      else if(s==='minimaal') mi++;
      else if(s==='net-droog') h++;
    }
    tD+=d;tM+=mi;tH+=h;pm.push({d:d,mi:mi,h:h});
  }
  document.getElementById('stats').innerHTML=
    '<div class="sc"><div class="sc-l">Droog</div><div class="sc-v vg">'+tD+'</div></div>'+
    '<div class="sc"><div class="sc-l">Minimaal</div><div class="sc-v vy">'+tM+'</div></div>'+
    '<div class="sc"><div class="sc-l">Niet droog</div><div class="sc-v vr">'+tH+'</div></div>';
  const max=Math.max(1,...pm.map(function(p){return p.d+p.mi+p.h;}));
  const bars=document.getElementById('bars');
  bars.innerHTML='';
  pm.forEach(function(p,i){
    const dP=Math.round(p.d /max*100);
    const mP=Math.round(p.mi/max*100);
    const hP=Math.round(p.h /max*100);
    const row=document.createElement('div'); row.className='brow';
    row.innerHTML=
      '<span class="bl">'+MONTHS[i].slice(0,3)+'</span>'+
      '<div class="bt">'+
        '<div class="bf" style="width:'+dP+'%;background:#a8d4a8;left:0"></div>'+
        '<div class="bf" style="width:'+mP+'%;background:#e6e87a;left:'+dP+'%"></div>'+
        '<div class="bf" style="width:'+hP+'%;background:#f0c4c4;left:'+(dP+mP)+'%"></div>'+
      '</div>'+
      '<span class="bn">'+(p.d+p.mi+p.h)+'</span>';
    bars.appendChild(row);
  });
}

loadAll();
setInterval(loadAll,30000);
</script>
</body>
</html>
